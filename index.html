            brandSelectors.forEach(select => {
                // 清空现有选项（保留第一个提示选项）
                while (select.options.length > 1) {
                    select.remove(1);
                }
                
                // 对品牌进行排序，并将贝朗放在第一位
                const sortedBrands = [...uniqueBrands].sort((a, b) => {
                    if (a === "贝朗") return -1;
                    if (b === "贝朗") return 1;
                    return a.localeCompare(b, 'zh-CN');
                });
                
                sortedBrands.forEach(brand => {
                    const option = document.createElement('option');
                    option.value = brand;
                    // 为贝朗添加星号强调
                    option.textContent = brand === "贝朗" ? "⭐ 贝朗" : brand;
                    select.appendChild(option);
                });
            });
        });

        // 添加品牌行
        let rowCounter = 1;
        function addBrandRow() {
            rowCounter++;
            const brandsContainer = document.getElementById('brands-container');
            
            // 获取唯一品牌列表并排序
            const uniqueBrands = [...new Set(drugData.map(item => item.企业))];
            const sortedBrands = [...uniqueBrands].sort((a, b) => {
                if (a === "贝朗") return -1;
                if (b === "贝朗") return 1;
                return a.localeCompare(b, 'zh-CN');
            });
            
            const newRow = document.createElement('div');
            newRow.className = 'brand-row';
            newRow.innerHTML = `
                <div class="brand-select">
                    <label for="brand${rowCounter}">选择品牌</label>
                    <select id="brand${rowCounter}" class="brand-selector">
                        <option value="">-- 请选择品牌 --</option>
                        ${sortedBrands.map(brand => 
                            `<option value="${brand}">${brand === "贝朗" ? "⭐ 贝朗" : brand}</option>`
                        ).join('')}
                    </select>
                </div>
                <div class="quantity-input">
                    <label for="quantity${rowCounter}">勾量数量</label>
                    <input type="number" id="quantity${rowCounter}" class="quantity-input-field" placeholder="输入数量" min="0" step="1">
                </div>
                <div class="remove-btn" onclick="removeBrandRow(this)">
                    <i class="fas fa-trash-alt"></i>
                </div>
            `;
            
            brandsContainer.appendChild(newRow);
        }

        // 删除品牌行
        function removeBrandRow(button) {
            const row = button.closest('.brand-row');
            if (document.querySelectorAll('.brand-row').length > 1) {
                row.remove();
            } else {
                alert('至少需要保留一个品牌行！');
            }
        }

        // 计算所有品牌结果
        function calculateAll() {
            const resultSection = document.getElementById('resultSection');
            const resultsContainer = document.getElementById('results-container');
            
            // 清空之前的结果
            resultsContainer.innerHTML = '';
            
            // 收集所有品牌行数据
            const brandRows = document.querySelectorAll('.brand-row');
            let hasValidInput = false;
            
            brandRows.forEach(row => {
                const brandSelect = row.querySelector('.brand-selector');
                const quantityInput = row.querySelector('.quantity-input-field');
                
                const brand = brandSelect.value;
                const quantity = parseFloat(quantityInput.value);
                
                if (!brand || isNaN(quantity) || quantity <= 0) {
                    return; // 跳过无效输入
                }
                
                hasValidInput = true;
                
                // 查找品牌数据
                const brandProducts = drugData.filter(item => item.企业 === brand);
                if (brandProducts.length === 0) return;
                
                // 计算锁定量和释放量（取第一个产品的比例）
                const allocRatio = brandProducts[0].分配比例;
                const releaseRatio = brandProducts[0].释放比例;
                const secondEligible = brandProducts[0].二次勾量资格;
                const ruleType = brandProducts[0].中选规则;
                
                // 计算锁定量和释放量，并向上取整
                const lockedQty = Math.ceil(quantity * allocRatio);
                const releasedQty = Math.ceil(quantity * releaseRatio);
                
                // 根据规则类型确定CSS类
                let ruleClass = '';
                if (ruleType === "规则一") ruleClass = "rule1";
                else if (ruleType === "规则二") ruleClass = "rule2";
                else if (ruleType === "规则三") ruleClass = "rule3";
                
                // 创建结果卡片
                const resultCard = document.createElement('div');
                resultCard.className = 'result-card';
                resultCard.innerHTML = `
                    <div class="brand-name">${brand}</div>
                    <div class="result-item">
                        <span class="result-label">一次勾量数量：</span>
                        <span class="result-value">${quantity}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">锁定量：</span>
                        <span class="result-value">${lockedQty}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">释放量：</span>
                        <span class="result-value">${releasedQty}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">中选规则：</span>
                        <span class="rule-type ${ruleClass}">${ruleType}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">二次勾量资格：</span>
                        <span class="eligibility ${secondEligible === '是' ? 'yes' : 'no'}">
                            ${secondEligible}
                        </span>
                    </div>
                    <div class="product-list">
                        <div class="product-list-title">
                            <i class="fas fa-pills"></i>
                            <span>产品详情</span>
                        </div>
                        ${brandProducts.map(product => `
                            <div class="product-item">
                                <div class="product-name">${product.药物}</div>
                                <div class="product-detail">
                                    <span class="detail-label">注册证号：</span>
                                    <span class="detail-value">${product.注册证}</span>
                                </div>
                                <div class="product-detail">
                                    <span class="detail-label">适应症：</span>
                                    <span class="detail-value">${product.适应证.replace(/<br>/g, ', ')}</span>
                                </div>
                                <div class="product-detail">
                                    <span class="detail-label">最终报价：</span>
                                    <span class="detail-value">${product.最终报价}元</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                resultsContainer.appendChild(resultCard);
            });
            
            if (hasValidInput) {
                resultSection.style.display = 'block';
                resultSection.scrollIntoView({ behavior: 'smooth' });
            } else {
                resultsContainer.innerHTML = `
                    <div class="no-brands">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>请添加有效的品牌和数量后重试</p>
                    </div>
                `;
                resultSection.style.display = 'block';
            }
        }
    </script>
</body>

</html>
